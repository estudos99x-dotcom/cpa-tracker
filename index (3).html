<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPA Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Poppins:wght@500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --bg: #10131a;
  --panel: #171c26;
  --panel-2: #1d2330;
  --border: #262e3d;
  --text: #e7ebf3;
  --text-dim: #8b94a7;
  --accent: #2dd4a7;
  --accent-dim: #1f8a6f;
  --danger: #e25c5c;
  --gold: #e8b34d;
  --purple: #b380e8;
  --radius: 12px;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);}
::selection{background:var(--accent);color:#08110d;}
a{color:inherit;}
.app{display:flex;min-height:100vh;}
.sidebar{width:230px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;}
.brand{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px;padding:6px 8px 22px;}
.brand .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);box-shadow:0 0 12px var(--accent);}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text-dim);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:2px;transition:.15s;}
.nav-item:hover{background:var(--panel-2);color:var(--text);}
.nav-item.active{background:var(--panel-2);color:var(--accent);}
.nav-item .ico{width:18px;text-align:center;font-size:15px;}
.sidebar-foot{margin-top:auto;padding:10px 8px;font-size:11px;color:var(--text-dim);font-family:var(--font-mono);}
.main{flex:1;padding:28px 34px;max-width:1200px;}
h1.page-title{font-family:var(--font-display);font-size:24px;margin:0 0 4px;letter-spacing:-0.01em;}
.page-sub{color:var(--text-dim);font-size:13px;margin:0 0 22px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:2fr 1fr;}
.grid-2{grid-template-columns:1fr 1fr;}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3,.grid-2{grid-template-columns:1fr;}}
.kpi-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.kpi-value{font-family:var(--font-mono);font-size:26px;font-weight:600;}
.kpi-value.pos{color:var(--accent);}
.kpi-value.neg{color:var(--danger);}
.kpi-sub{font-size:11px;color:var(--text-dim);margin-top:6px;}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.pill{padding:7px 14px;border-radius:20px;background:var(--panel-2);border:1px solid var(--border);font-size:12.5px;cursor:pointer;color:var(--text-dim);font-weight:500;}
.pill.active{background:var(--accent);border-color:var(--accent);color:#08110d;}
.date-range{display:flex;gap:8px;align-items:center;margin-left:auto;font-size:12.5px;color:var(--text-dim);}
input[type=date],input[type=text],input[type=number],select,textarea{
  background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-family:var(--font-body);font-size:13.5px;width:100%;
}
input[type=date]{color-scheme:dark;}
label{font-size:12px;color:var(--text-dim);margin-bottom:6px;display:block;font-weight:500;}
.field{margin-bottom:14px;}
.btn{background:var(--accent);color:#08110d;border:none;padding:10px 18px;border-radius:8px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:var(--font-body);}
.btn:hover{filter:brightness(1.08);}
.btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn.danger{background:var(--danger);color:#fff;}
.btn.small{padding:6px 11px;font-size:12px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--text-dim);font-weight:500;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border);}
td{padding:10px 10px;border-bottom:1px solid var(--border);}
tr:hover td{background:rgba(255,255,255,0.02);}
.house-chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;}
.house-chip .sw{width:8px;height:8px;border-radius:2px;display:inline-block;}
.mono{font-family:var(--font-mono);}
.pos{color:var(--accent);}
.neg{color:var(--danger);}
.section-title{font-family:var(--font-display);font-size:15px;font-weight:600;margin:0 0 14px;}
.modal-bg{position:fixed;inset:0;background:rgba(6,8,12,0.7);display:none;align-items:center;justify-content:center;z-index:50;}
.modal-bg.show{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:420px;max-width:92vw;max-height:88vh;overflow:auto;}
.modal h3{margin:0 0 16px;font-family:var(--font-display);font-size:17px;}
.row{display:flex;gap:10px;}
.row > *{flex:1;}
.empty{color:var(--text-dim);font-size:13px;padding:30px 0;text-align:center;}
.house-card{border:1px solid var(--border);border-radius:10px;padding:14px 16px;background:var(--panel-2);}
.house-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tag-auto{font-size:10.5px;background:var(--gold);color:#2a1c00;padding:2px 7px;border-radius:10px;font-weight:600;}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.note-card{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:14px;min-height:120px;display:flex;flex-direction:column;}
.note-card .title{font-weight:600;font-size:14px;margin-bottom:6px;}
.note-card .body{font-size:13px;color:var(--text-dim);white-space:pre-wrap;flex:1;}
.note-card .foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:var(--text-dim);}
.icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:3px 6px;border-radius:5px;}
.icon-btn:hover{background:var(--panel);color:var(--text);}
.goal-bar-track{height:8px;background:var(--panel);border-radius:6px;overflow:hidden;margin-top:8px;}
.goal-bar-fill{height:100%;background:var(--accent);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel-2);border:1px solid var(--border);padding:12px 18px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;display:none;}
.toast.show{display:block;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);}
.chart-wrap{position:relative;height:230px;}
@media(max-width:760px){.sidebar{width:64px;padding:16px 8px;}.brand span.label,.nav-item span.label{display:none;}.main{padding:20px 14px;}}

/* Aparência / layout customizável */
.app.nav-top{flex-direction:column;}
.app.nav-top .sidebar{width:100%;height:auto;position:sticky;top:0;flex-direction:row;align-items:center;padding:12px 24px;border-right:none;border-bottom:1px solid var(--border);z-index:10;}
.app.nav-top .brand{padding:0 20px 0 0;}
.app.nav-top #nav{display:flex;gap:4px;flex:1;flex-wrap:wrap;}
.app.nav-top .sidebar-foot{display:none;}
.app.compact .main{padding:18px 22px;}
.app.compact .card{padding:12px 14px;}
.app.compact .grid{gap:10px;}
input[type=color]{width:44px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;background:var(--panel-2);cursor:pointer;}
.theme-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.theme-row:last-child{border-bottom:none;}
.theme-row label{margin:0;color:var(--text);font-weight:500;font-size:13px;}
.swatch-preview{display:flex;gap:6px;margin-top:14px;}
.swatch-preview .sw{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand"><span class="dot"></span><span class="label">CPA Tracker</span></div>
    <div id="nav"></div>
    <div class="sidebar-foot">Fuso: America/Sao_Paulo (GMT-3)</div>
  </div>
  <div class="main" id="main"></div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>

/* ============ HELPERS DE FUSO HORÁRIO (America/Sao_Paulo, GMT-3 fixo, sem horário de verão) ============ */
function brNow(){
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utcMs - 3*60*60*1000);
}
function toISODate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function brToday(){ return toISODate(brNow()); }
function addDaysISO(iso, days){
  const [y,m,d]=iso.split('-').map(Number);
  const dt=new Date(Date.UTC(y,m-1,d));
  dt.setUTCDate(dt.getUTCDate()+days);
  return dt.toISOString().split('T')[0];
}
function fmtDateBR(iso){
  const [y,m,d]=iso.split('-');
  return `${d}/${m}/${y}`;
}
function fmtMoney(v){
  const n = Number(v)||0;
  return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ============ STORAGE ============ */
const STORAGE_OK = !!(window.storage && window.storage.get);
async function stGet(key, fallback){
  if(!STORAGE_OK) return fallback;
  try{
    const r = await window.storage.get(key, false);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){ return fallback; }
}
async function stSet(key, value){
  if(!STORAGE_OK) return;
  try{ await window.storage.set(key, JSON.stringify(value), false); }catch(e){ console.error('storage set failed', key, e); }
}

async function loadState(){
  const seeded = await stGet('cpa_seeded', false);
  if(!seeded){
    state.houses = SEED_HOUSES;
    state.records = SEED_RECORDS;
    state.goals = [];
    state.notes = [];
    await persistAll();
    await stSet('cpa_seeded', true);
  } else {

    state.records = await stGet('cpa_records', []);
    state.goals = await stGet('cpa_goals', []);

  }
  state.theme = { ...DEFAULT_THEME, ...(await stGet('cpa_theme', {})) };

  const t = state.theme;

  root.setProperty('--bg', t.bg);
  root.setProperty('--panel', t.panel);
  root.setProperty('--panel-2', t.panel2);
  root.setProperty('--border', t.border);
  root.setProperty('--text', t.text);
  root.setProperty('--text-dim', t.textDim);
  root.setProperty('--accent', t.accent);
  root.setProperty('--accent-dim', t.accent);
  root.setProperty('--danger', t.danger);
  root.setProperty('--gold', t.gold);
  root.setProperty('--purple', t.purple);
  root.setProperty('--font-display', FONT_MAP[t.displayFont] || FONT_MAP.grotesk);
  const appEl = document.querySelector('.app');
  if(appEl){
    appEl.className = 'app' + (t.navPosition==='topo' ? ' nav-top' : '') + (t.density==='compact' ? ' compact' : '');

}

/* ============ FILTRO DE PERÍODO (usado no dashboard) ============ */
function rangeFromPreset(preset){
  const today = brToday();
  if(preset==='hoje') return {from:today, to:today};
  if(preset==='7d') return {from:addDaysISO(today,-6), to:today};
  if(preset==='30d') return {from:addDaysISO(today,-29), to:today};
  if(preset==='mes'){
    const d = brNow();
    const from = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    return {from, to:today};
  }
  if(preset==='tudo') return {from:'0000-01-01', to:'9999-12-31'};
  return {from:'0000-01-01', to:'9999-12-31'};
}
function filteredRecords(from, to, extra){
  extra = extra || {};
  return state.records.filter(r=>{
    if(r.date < from || r.date > to) return false;
    if(extra.casa && r.house !== extra.casa) return false;
    if(extra.tipo==='lucro' && !(r.net>0)) return false;
    if(extra.tipo==='prejuizo' && !(r.net<0)) return false;
    if(extra.tipo==='zero' && r.net!==0) return false;
    if(extra.fluxo==='entradas' && r.net<0) return false;
    if(extra.fluxo==='saidas' && r.net>=0) return false;
    if(extra.busca){
      const q = extra.busca.toLowerCase();
      if(!(r.house.toLowerCase().includes(q) || (r.obs||'').toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

  const totalEntradas = recs.filter(r=>r.net>0).reduce((s,r)=>s+r.net,0);
  const totalSaidas = recs.filter(r=>r.net<0).reduce((s,r)=>s+Math.abs(r.net),0);
  const liquido = recs.reduce((s,r)=>s+r.net,0);
  const totalCpa = recs.reduce((s,r)=>s+r.cpa,0);

  const last = [...state.records].sort((a,b)=> (b.date+b.createdAt).localeCompare(a.date+a.createdAt)).slice(0,8);

  return `

        <span>De</span><input type="date" id="dashFrom" value="${state.dashFrom||''}" style="width:150px">
        <span>Até</span><input type="date" id="dashTo" value="${state.dashTo||''}" style="width:150px">
        ${state.dashFrom?'<button class="btn secondary small" id="clearRange">Limpar</button>':''}
      </div>
    </div>

    <div class="grid grid-4" style="margin-bottom:18px;">
      <div class="card"><div class="kpi-label">Entradas</div><div class="kpi-value pos mono">R$ ${fmtMoney(totalEntradas)}</div><div class="kpi-sub">${recs.filter(r=>r.net>0).length} registros positivos</div></div>
      <div class="card"><div class="kpi-label">Saídas</div><div class="kpi-value neg mono">R$ ${fmtMoney(totalSaidas)}</div><div class="kpi-sub">${recs.filter(r=>r.net<0).length} registros negativos</div></div>

      <div class="card"><div class="kpi-label">CPA Total</div><div class="kpi-value mono">R$ ${fmtMoney(totalCpa)}</div><div class="kpi-sub">${recs.length} contas no período</div></div>
    </div>

    <div class="grid grid-2" style="margin-bottom:16px;">
      <div class="card"><div class="section-title">Receita por Casa</div><div class="chart-wrap"><canvas id="chartCasa"></canvas></div></div>
      <div class="card"><div class="section-title">Distribuição por Casa</div><div class="chart-wrap"><canvas id="chartDist"></canvas></div></div>

function drawCharts(){
  Object.values(state.charts).forEach(c=>c && c.destroy());
  state.charts = {};

  let from, to;
  if(state.dashFrom && state.dashTo){ from=state.dashFrom; to=state.dashTo; }
  else { const r = rangeFromPreset(state.dashRange); from=r.from; to=r.to; }
  const recs = filteredRecords(from, to);

  const byHouse = {};
  state.houses.forEach(h=>byHouse[h.name]=0);
  recs.forEach(r=>{ byHouse[r.house]=(byHouse[r.house]||0)+r.net; });
  const houseNames = Object.keys(byHouse).filter(n=>byHouse[n]!==0 || state.houses.some(h=>h.name===n));
  const colors = houseNames.map(n=>houseColor(n));

  const ctxCasa = document.getElementById('chartCasa');
  if(ctxCasa){
    state.charts.casa = new Chart(ctxCasa, {
      type:'bar',
      data:{ labels:houseNames, datasets:[{ data:houseNames.map(n=>byHouse[n]), backgroundColor:colors, borderRadius:6 }] },
      options:{ indexAxis:'y', plugins:{legend:{display:false}}, scales:{ x:{grid:{color:'#262e3d'}, ticks:{color:'#8b94a7'}}, y:{grid:{display:false}, ticks:{color:'#e7ebf3'}} } }
    });
  }
  const ctxDist = document.getElementById('chartDist');
  if(ctxDist){
    const counts = houseNames.map(n=>recs.filter(r=>r.house===n).length);
    state.charts.dist = new Chart(ctxDist, {
      type:'doughnut',
      data:{ labels:houseNames, datasets:[{ data:counts, backgroundColor:colors, borderWidth:0 }] },
      options:{ plugins:{legend:{position:'bottom', labels:{color:'#8b94a7', font:{size:11}, boxWidth:8}}} }
    });
  }
  const ctxLine = document.getElementById('chartLine');
  if(ctxLine){
    const days = {};
    recs.forEach(r=>{ days[r.date]=(days[r.date]||0)+r.net; });
    const sortedDays = Object.keys(days).sort();
    state.charts.line = new Chart(ctxLine, {
      type:'line',
      data:{ labels:sortedDays.map(fmtDateBR), datasets:[{ data:sortedDays.map(d=>days[d]), borderColor:'#2dd4a7', backgroundColor:'rgba(45,212,167,0.12)', fill:true, tension:.3, pointRadius:2 }] },
      options:{ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false}, ticks:{color:'#8b94a7', maxRotation:0}}, y:{grid:{color:'#262e3d'}, ticks:{color:'#8b94a7'}} } }
    });
  }
}

  const debitEl = document.getElementById('fDebit');
  const creditEl = document.getElementById('fCredit');
  const notice = document.getElementById('autoNotice');
  let debit = parseFloat(debitEl.value)||0;
  let credit = parseFloat(creditEl.value)||0;
  let net;
  if(h && h.autoProfit!=null){
    debitEl.value=''; creditEl.value=''; debitEl.disabled=true; creditEl.disabled=true;
    notice.style.display='block';
    notice.innerHTML = `<span class="tag-auto">LUCRO AUTOMÁTICO</span> Esta casa aplica lucro fixo de <b>R$ ${fmtMoney(h.autoProfit)}</b> automaticamente.`;
    net = h.autoProfit;
  } else {
    debitEl.disabled=false; creditEl.disabled=false; notice.style.display='none';
    net = (h?h.cpa:0) - debit + credit;
  }
  document.getElementById('resumoBox').innerHTML = h ? `
    <table>
      <tr><td>Casa</td><td class="mono">${h.name}</td></tr>
      <tr><td>CPA base</td><td class="mono">R$ ${fmtMoney(h.cpa)}</td></tr>
      <tr><td>Ajustes</td><td class="mono">${h.autoProfit!=null?'—':`-${fmtMoney(debit)} / +${fmtMoney(credit)}`}</td></tr>
      <tr><td><b>Líquido</b></td><td class="mono ${net>=0?'pos':'neg'}"><b>R$ ${fmtMoney(net)}</b></td></tr>
    </table>` : '<div class="empty">Selecione uma casa para ver o resumo</div>';
}

function exportCSV(recs){
  const header = '"ID","Data","Casa","CPA","Ajustes","Líquido","Obs"';
  const lines = recs.map(r=>{
    const ajuste = r.debit? `-${r.debit} `: (r.credit? `+${r.credit} `: '');
    return `"${r.id}","${r.date}","${r.house}","${r.cpa}","${ajuste}","${r.net.toFixed(2)}","${r.obs||''}"`;
  });
  const csv = [header, ...lines].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `cpa_tracker_${brToday()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

        </div>`;
      }).join('') : '<div class="empty">Nenhuma meta cadastrada</div>'}

  `;
}

/* ============ HANDLERS ============ */
function attachHandlers(){
  // Dashboard
  document.querySelectorAll('.pill[data-preset]').forEach(p=>{
    p.addEventListener('click', ()=>{ state.dashRange=p.dataset.preset; state.dashFrom=null; state.dashTo=null; render(); });
  });
  const dFrom = document.getElementById('dashFrom'), dTo = document.getElementById('dashTo');
  if(dFrom) dFrom.addEventListener('change', ()=>{ state.dashFrom=dFrom.value; if(state.dashTo) render(); });
  if(dTo) dTo.addEventListener('change', ()=>{ state.dashTo=dTo.value; if(state.dashFrom) render(); });
  const clearRange = document.getElementById('clearRange');
  if(clearRange) clearRange.addEventListener('click', ()=>{ state.dashFrom=null; state.dashTo=null; render(); });

  // Novo Registro
  const fHouse = document.getElementById('fHouse');
  if(fHouse){
    ['fHouse','fDebit','fCredit'].forEach(id=>document.getElementById(id).addEventListener('input', updateResumo));
    updateResumo();
    document.getElementById('saveRegistro').addEventListener('click', async ()=>{
      const hName = fHouse.value;
      const h = houseByName(hName);
      const date = document.getElementById('fDate').value || brToday();
      const debit = parseFloat(document.getElementById('fDebit').value)||0;
      const credit = parseFloat(document.getElementById('fCredit').value)||0;
      const obs = document.getElementById('fObs').value;
      let net;
      if(h.autoProfit!=null) net = h.autoProfit;
      else net = h.cpa - debit + credit;
      state.records.push({
        id: uid(), date, house: h.name, cpa: h.cpa,
        debit: h.autoProfit!=null?0:debit, credit: h.autoProfit!=null?0:credit,
        net, obs, createdAt: Date.now().toString()
      });
      await saveRecords();
      showToast('Registro salvo com sucesso');
      state.tab='historico'; render();
    });
  }

  // Histórico
  const hBusca = document.getElementById('hBusca');
  if(hBusca){
    hBusca.addEventListener('input', ()=>{ state.histFilters.busca=hBusca.value; render(); });
    document.getElementById('hCasa').addEventListener('change', e=>{ state.histFilters.casa=e.target.value; render(); });
    document.getElementById('hTipo').addEventListener('change', e=>{ state.histFilters.tipo=e.target.value; render(); });
    document.getElementById('hFluxo').addEventListener('change', e=>{ state.histFilters.fluxo=e.target.value; render(); });
    document.getElementById('hDe').addEventListener('change', e=>{ state.histFilters.de=e.target.value; render(); });
    document.getElementById('hAte').addEventListener('change', e=>{ state.histFilters.ate=e.target.value; render(); });
    document.getElementById('hClear').addEventListener('click', ()=>{ state.histFilters={casa:'',tipo:'',de:'',ate:'',busca:'',fluxo:''}; render(); });
    document.getElementById('hExport').addEventListener('click', ()=>{
      const f = state.histFilters;
      const recs = filteredRecords(f.de||'0000-01-01', f.ate||'9999-12-31', f);
      exportCSV(recs);
    });
    document.querySelectorAll('.edit-rec').forEach(b=>b.addEventListener('click', ()=>openEditModal(b.dataset.id)));
    document.querySelectorAll('.del-rec').forEach(b=>b.addEventListener('click', async ()=>{
      if(confirm('Tem certeza que quer excluir este registro? Essa ação não pode ser desfeita.')){
        state.records = state.records.filter(r=>r.id!==b.dataset.id);
        await saveRecords(); render(); showToast('Registro excluído');
      }
    }));
  }

  // Casas
  const addHouseBtn = document.getElementById('addHouse');
  if(addHouseBtn){
    addHouseBtn.addEventListener('click', async ()=>{
      const name = document.getElementById('nHouseName').value.trim();
      if(!name){ showToast('Digite um nome para a casa'); return; }
      if(houseByName(name)){ showToast('Já existe uma casa com esse nome'); return; }
      const cpa = parseFloat(document.getElementById('nHouseCpa').value)||0;
      const autoVal = document.getElementById('nHouseAuto').value;
      const color = document.getElementById('nHouseColor').value || '#4f9dde';
      state.houses.push({ id:uid(), name, cpa, autoProfit: autoVal===''?null:parseFloat(autoVal), color });
      await saveHouses(); render(); showToast('Casa adicionada');
    });
    document.querySelectorAll('.edit-house').forEach(b=>b.addEventListener('click', ()=>openHouseEdit(b.dataset.name)));
    document.querySelectorAll('.del-house').forEach(b=>b.addEventListener('click', async ()=>{
      if(confirm(`Excluir a casa "${b.dataset.name}"? Os registros já feitos não serão apagados.`)){
        state.houses = state.houses.filter(h=>h.name!==b.dataset.name);
        await saveHouses(); render(); showToast('Casa excluída');
      }
    }));
  }

  // Metas
  const addGoalBtn = document.getElementById('addGoal');
  if(addGoalBtn){
    addGoalBtn.addEventListener('click', async ()=>{
      const name = document.getElementById('gName').value.trim();
      const target = parseFloat(document.getElementById('gTarget').value);
      if(!name || !target){ showToast('Preencha nome e valor alvo'); return; }
      state.goals.push({ id:uid(), name, target, house: document.getElementById('gHouse').value, metric: document.getElementById('gMetric').value });
      await saveGoals(); render(); showToast('Meta criada');
    });
    document.querySelectorAll('.del-goal').forEach(b=>b.addEventListener('click', async ()=>{
      state.goals = state.goals.filter(g=>g.id!==b.dataset.id);
      await saveGoals(); render();
    }));
  }

  // Notas
  const addNoteBtn = document.getElementById('addNote');
  if(addNoteBtn){
    addNoteBtn.addEventListener('click', async ()=>{
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteBody').value.trim();
      if(!title && !content) return;
      state.notes.push({ id:uid(), title, content, updatedAt: brToday()+' '+brNow().toTimeString().slice(0,5) });
      await saveNotes(); render(); showToast('Nota adicionada');
    });
    document.querySelectorAll('.edit-note').forEach(b=>b.addEventListener('click', ()=>openNoteEdit(b.dataset.id)));
    document.querySelectorAll('.del-note').forEach(b=>b.addEventListener('click', async ()=>{
      state.notes = state.notes.filter(n=>n.id!==b.dataset.id);
      await saveNotes(); render();
    }));
  }

  // Dados
  const exportAllBtn = document.getElementById('exportAll');
  if(exportAllBtn){
    exportAllBtn.addEventListener('click', ()=>{
      const data = { houses:state.houses, records:state.records, goals:state.goals, notes:state.notes, exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=`cpa_tracker_backup_${brToday()}.json`; a.click();
      URL.revokeObjectURL(url);
    });
    document.getElementById('exportAllCSV').addEventListener('click', ()=>exportCSV(state.records));
    document.getElementById('importFile').addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = async (evt)=>{
        try{
          const data = JSON.parse(evt.target.result);
          if(!confirm('Isso vai substituir todos os dados atuais. Continuar?')) return;
          state.houses = data.houses || state.houses;
          state.records = data.records || [];
          state.goals = data.goals || [];
          state.notes = data.notes || [];
          await persistAll();
          render();
          showToast('Backup importado com sucesso');
        }catch(err){ alert('Arquivo inválido: '+err.message); }
      };
      reader.readAsText(file);
    });
    document.getElementById('resetAll').addEventListener('click', async ()=>{
      if(confirm('Isso vai apagar TODOS os dados salvos. Tem certeza?')){
        state.houses = SEED_HOUSES; state.records = []; state.goals = []; state.notes = [];
        await persistAll();
        render();
        showToast('Dados resetados');
      }
    });
  }

  // Aparência
  const themeColors = document.querySelectorAll('.theme-color');
  if(themeColors.length){
    themeColors.forEach(inp=>{
      inp.addEventListener('input', ()=>{ state.theme[inp.dataset.key]=inp.value; applyTheme(); });
    });
    document.getElementById('themeNavPos').addEventListener('change', e=>{ state.theme.navPosition=e.target.value; applyTheme(); });
    document.getElementById('themeDensity').addEventListener('change', e=>{ state.theme.density=e.target.value; applyTheme(); });
    document.getElementById('themeFont').addEventListener('change', e=>{ state.theme.displayFont=e.target.value; applyTheme(); });
    document.getElementById('saveTheme').addEventListener('click', async ()=>{ await saveTheme(); showToast('Aparência salva'); });
    document.getElementById('resetTheme').addEventListener('click', async ()=>{
      state.theme = { ...DEFAULT_THEME };
      await saveTheme();
      render();
      showToast('Aparência restaurada');
    });
  }

  document.getElementById('modalBg').addEventListener('click', (e)=>{ if(e.target.id==='modalBg') closeModal(); });
}

/* ============ INIT ============ */
(async function init(){
  await loadState();
  render();
})();
</script>
</body>
</html>
